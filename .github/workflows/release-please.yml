name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        with:
          # Prefer a PAT so the "release created" event triggers the Release
          # workflow. Events generated by the default GITHUB_TOKEN do not
          # trigger other workflows. Falls back to GITHUB_TOKEN if unset —
          # release-please still opens the PR, but goreleaser must be run
          # manually via workflow_dispatch after the release is created.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
